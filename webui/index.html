<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>m3dscad WebUI</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="mobile-toggle">
        <button id="toggleCode" class="toggle-btn active">Code</button>
        <button id="togglePreview" class="toggle-btn">Preview</button>
      </div>
      <div class="panel panel-left" id="panelCode">
        <header class="panel-header">
          <div class="title">m3dscad</div>
          <div class="subtitle">Command+S to compile</div>
        </header>
        <div id="code" class="code-editor"></div>
        <div class="status" id="status">WASM not loaded.</div>
      </div>
      <div class="resizer" id="resizer"></div>
      <div class="panel panel-right" id="panelPreview">
        <div class="toolbar">
          <div class="toolbar-group">
            <label>
              <span>Grid</span>
              <input id="grid" type="number" step="1" min="8" max="512" value="128" />
            </label>
            <button id="compile">Compile</button>
            <button id="resetView">Reset View</button>
            <button id="download" disabled>Download</button>
          </div>
        </div>
        <div class="viewport">
          <canvas id="preview"></canvas>
          <svg
            class="axis-indicator"
            id="axisIndicator"
            viewBox="0 0 64 64"
            aria-label="Axis orientation indicator"
          >
            <circle cx="32" cy="32" r="2.5" class="axis-center"></circle>
            <line id="axisLineX" x1="32" y1="32" x2="48" y2="32" class="axis-line axis-line-x"></line>
            <line id="axisLineY" x1="32" y1="32" x2="32" y2="16" class="axis-line axis-line-y"></line>
            <line id="axisLineZ" x1="32" y1="32" x2="32" y2="48" class="axis-line axis-line-z"></line>
            <text id="axisLabelX" x="50" y="32" class="axis-label axis-label-x">X</text>
            <text id="axisLabelY" x="32" y="14" class="axis-label axis-label-y">Y</text>
            <text id="axisLabelZ" x="32" y="50" class="axis-label axis-label-z">Z</text>
          </svg>
          <div class="overlay" id="overlay">
            <div class="overlay-card" id="overlayCard">
              <div class="spinner" id="spinner"></div>
              <div class="overlay-text" id="overlayText">Loading...</div>
              <button id="cancel" class="cancel-button">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./wasm_exec.js"></script>
    <script src="./main.bundle.js"></script>
  </body>
</html>
